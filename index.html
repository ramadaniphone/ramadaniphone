<div id="app">
  <div class="load">

    <div style="color:#c9a227;font-size:18px;font-weight:900">Ramadan iPhone</div>

<script>
// ── Firestore REST API (no SDK needed!) ───────────────────────────────────────
const PROJECT = "ramadaniphone-510fb";
const BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;
const API_KEY = "AIzaSyAhF3rENrkIud502v2q9F1XUtSExM39Q2I";

// Convert Firestore REST format to plain object
function fromFS(doc) {
  if (!doc || !doc.fields) return null;
  const obj = { _id: doc.name.split("/").pop() };
  for (const [k, v] of Object.entries(doc.fields)) {
    if (v.stringValue !== undefined) obj[k] = v.stringValue;
    else if (v.integerValue !== undefined) obj[k] = Number(v.integerValue);
    else if (v.doubleValue !== undefined) obj[k] = Number(v.doubleValue);
    else if (v.booleanValue !== undefined) obj[k] = v.booleanValue;
    else if (v.arrayValue !== undefined) obj[k] = (v.arrayValue.values || []).map(x => fromFS({name:"",fields:{"_":x}})?.["_"] ?? fromFSVal(x));
    else if (v.mapValue !== undefined) obj[k] = fromFS({name:"",fields: v.mapValue.fields||{}});
    else obj[k] = null;
  }
  return obj;
}
function fromFSVal(v) {
  if (!v) return null;
  if (v.stringValue !== undefined) return v.stringValue;
  if (v.integerValue !== undefined) return Number(v.integerValue);
  if (v.doubleValue !== undefined) return Number(v.doubleValue);
  if (v.booleanValue !== undefined) return v.booleanValue;
  if (v.mapValue !== undefined) return fromFS({name:"",fields:v.mapValue.fields||{}});
  if (v.arrayValue !== undefined) return (v.arrayValue.values||[]).map(fromFSVal);
  return null;
}

// Convert plain object to Firestore REST format
function toFS(obj) {
  const fields = {};
  for (const [k, v] of Object.entries(obj)) {
    if (k === "_id" || k === "_ts") continue;
    fields[k] = toFSVal(v);
  }
  return { fields };
}
function toFSVal(v) {
  if (v === null || v === undefined) return { nullValue: null };
  if (typeof v === "boolean") return { booleanValue: v };
  if (typeof v === "number") return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
  if (typeof v === "string") return { stringValue: v };
  if (Array.isArray(v)) return { arrayValue: { values: v.map(toFSVal) } };
  if (typeof v === "object") return { mapValue: { fields: Object.fromEntries(Object.entries(v).map(([k,x])=>[k,toFSVal(x)])) } };
  return { stringValue: String(v) };
}

// REST API calls
async function fsGet(col) {
  try {
    const r = await fetch(`${BASE}/${col}?key=${API_KEY}&pageSize=200`);
    if (!r.ok) return [];
    const d = await r.json();
    return (d.documents || []).map(fromFS).filter(Boolean).reverse();
  } catch { return []; }
}
async function fsAdd(col, data) {
  try {
    const r = await fetch(`${BASE}/${col}?key=${API_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(toFS(data))
    });
    return r.ok;
  } catch { return false; }
}
async function fsUpdate(col, id, data) {
  try {
    const fields = toFS(data).fields;
    const mask = Object.keys(fields).map(f=>`updateMask.fieldPaths=${encodeURIComponent(f)}`).join("&");
    const r = await fetch(`${BASE}/${col}/${id}?key=${API_KEY}&${mask}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fields })
    });
    return r.ok;
  } catch { return false; }
}

// ── Constants ─────────────────────────────────────────────────────────────────
const USERS = [
  {id:"owner",name:"Owner",   role:"owner",pin:"0000",av:"👑"},
  {id:"w1",   name:"Ibrahim", role:"tech", pin:"1111",av:"🔧"},
  {id:"w2",   name:"Maxamed", role:"tech", pin:"2222",av:"🔧"},
  {id:"w3",   name:"Ayaanle", role:"tech", pin:"3333",av:"🔧"},
];
const IMODELS=["iPhone 6","iPhone 6S","iPhone 7","iPhone 7 Plus","iPhone 8","iPhone 8 Plus","iPhone X","iPhone XS","iPhone XS Max","iPhone XR","iPhone 11","iPhone 11 Pro","iPhone 11 Pro Max","iPhone 12","iPhone 12 Mini","iPhone 12 Pro","iPhone 12 Pro Max","iPhone 13","iPhone 13 Mini","iPhone 13 Pro","iPhone 13 Pro Max","iPhone 14","iPhone 14 Plus","iPhone 14 Pro","iPhone 14 Pro Max","iPhone 15","iPhone 15 Plus","iPhone 15 Pro","iPhone 15 Pro Max","iPhone 16","iPhone 16 Plus","iPhone 16 Pro","iPhone 16 Pro Max","Kale"];
const RTYPES=["Shaashadda (Screen)","Batariyada","Camera","Charging Port","Badhanka Home","Badhanka Dhinaca","Speaker","Microphone","Face ID","Back Glass","Motherboard","Biyo galay","Checking kaliya","Kale"];
const ICATS=["📱 iPhone Celis","🎧 Earphones","⚡ Charger","🛡️ Screen Protector","📦 Case","🔋 Battery","🔩 Spare Part","🔁 Kale"];
const COLS = ["repairs","inv","iphones","sales","debts","sups"];

// ── Helpers ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => "$"+Number(n||0).toLocaleString();
const num = n => Number(n||0);
const tod = () => new Date().toLocaleDateString("en-GB");
const sumP = arr => (arr||[]).reduce((s,p)=>s+num(p.amount),0);

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  user:null, tab:"dash", modal:null, det:null,
  srch:"", sv:"items",
  repairs:[], inv:[], iphones:[], sales:[], debts:[], sups:[],
  loading:true
};

// ── Load all data ─────────────────────────────────────────────────────────────
async function loadAll() {
  S.loading = true; render();
  const results = await Promise.all(COLS.map(c => fsGet(c)));
  COLS.forEach((c,i) => S[c] = results[i]);
  S.loading = false; render();
}

// Poll every 5 seconds for real-time feel
setInterval(async () => {
  if (!S.loading && S.user) {
    const results = await Promise.all(COLS.map(c => fsGet(c)));
    COLS.forEach((c,i) => S[c] = results[i]);
    render();
  }
}, 5000);

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, err=false) {
  const old = $("_t"); if(old) old.remove();
  const t = document.createElement("div");
  t.id = "_t"; t.className = "toast";
  t.style.borderColor = err ? "#ef4444" : "#c9a227";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app = $("app");
  if (S.loading) {
    app.innerHTML = `<div class="load"><div style="font-size:60px">📱</div><div style="color:#c9a227;font-size:18px;font-weight:900">Ramadan iPhone</div><div style="color:#78716c;font-size:13px">Xogta la soo rarayo...</div><div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>`;
    return;
  }
  if (!S.user) { loginPage(); return; }
  mainApp();
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
let _su = null;
function loginPage() {
  $("app").innerHTML = `
  <div class="lgbg"><div class="lgcard">
    <div style="font-size:60px;text-align:center">📱</div>
    <div class="lgt">Ramadan iPhone</div>
    <div class="lgs">Electronic &amp; Repair</div>
    <div class="lbl">Cidda aad tahay dooro:</div>
    <div class="ug">
      ${USERS.map(u=>`<button class="ubtn" id="ub${u.id}" onclick="_pu('${u.id}')"><span style="font-size:24px">${u.av}</span>${u.name}</button>`).join("")}
    </div>
    <div id="pa" style="display:none;flex-direction:column;gap:10px">
      <div class="lbl">PIN (4 tiro):</div>
      <input class="pinp" id="pi" type="password" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')_dl()">
      <div id="pe" style="color:#ef4444;text-align:center;font-size:13px;display:none">❗ PIN khaldan!</div>
      <button class="fbtn" style="background:linear-gradient(135deg,#c9a227,#a07a10);color:#000" onclick="_dl()">🔓 Gal Nidaamka</button>
    </div>
  </div></div>`;
}
function _pu(id) {
  _su = USERS.find(u=>u.id===id);
  document.querySelectorAll(".ubtn").forEach(b=>b.classList.remove("on"));
  $("ub"+id).classList.add("on");
  $("pa").style.display="flex";
  $("pi").value=""; $("pe").style.display="none";
  setTimeout(()=>$("pi")?.focus(),100);
}
function _dl() {
  if(!_su)return;
  if($("pi").value===_su.pin){S.user=_su;render();}
  else{$("pe").style.display="block";$("pi").value="";}
}

// ── COMPUTED ──────────────────────────────────────────────────────────────────
function calc() {
  return {
    rRev: S.repairs.filter(r=>r.status==="Dhammaatay"&&r.payStatus==="Suubiyay").reduce((s,r)=>s+num(r.price),0),
    rOwe: S.repairs.filter(r=>r.status==="Dhammaatay"&&r.payStatus==="La'aanta").reduce((s,r)=>s+num(r.price),0),
    sRev: S.sales.reduce((s,x)=>s+num(x.totalPrice),0),
    sCst: S.sales.reduce((s,x)=>s+num(x.totalCost),0),
    dTot: S.debts.reduce((s,c)=>s+Math.max(0,num(c.totalAmount)-num(c.paidAmount)),0),
    spOw: S.sups.filter(s=>s.buyType!=="kaash").reduce((s,x)=>s+Math.max(0,num(x.totalAmount)-sumP(x.payments)),0),
    ipSt: S.iphones.filter(i=>i.status==="Jira").length,
  };
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function mainApp() {
  const c = calc();
  const TABS=[{id:"dash",ic:"📊",lb:"Guud"},{id:"repairs",ic:"🔧",lb:"Farasmo"},{id:"inv",ic:"📦",lb:"Stock"},{id:"sales",ic:"💰",lb:"Iib"},{id:"debts",ic:"🤝",lb:"Deyn"},{id:"sups",ic:"🏪",lb:"Supplier"}];
  let body="";
  if(S.tab==="dash")    body=tDash(c);
  else if(S.tab==="repairs") body=tRepairs();
  else if(S.tab==="inv")    body=tStock();
  else if(S.tab==="sales")  body=tSales(c);
  else if(S.tab==="debts")  body=tDebts(c);
  else if(S.tab==="sups")   body=tSups(c);

  $("app").innerHTML=`
  <div class="topbar">
    <div style="font-size:28px">📱</div>
    <div><div class="sn">Ramadan iPhone</div><div class="ss">Electronic &amp; Repair</div></div>
    <div class="uc">
      <span style="font-size:8px;color:#4ade80">🟢</span>
      <span>${S.user.av}</span>
      <span style="font-size:11px">${S.user.name}</span>
      <button class="ib" onclick="oM('chPin')" title="Beddel PIN">🔑</button>
      <button class="ib" onclick="S.user=null;render()">✕</button>
    </div>
  </div>
  <div class="body">${body}</div>
  <div class="nav">${TABS.map(t=>`<button class="nb ${S.tab===t.id?"on":""}" onclick="gT('${t.id}')"><span class="ic">${t.ic}</span>${t.lb}</button>`).join("")}</div>
  ${S.modal?mWrap(S.modal):""}
  ${S.det?dWrap(S.det):""}`;
}

function gT(t){S.tab=t;S.srch="";render();}
function oM(m){S.modal=m;render();}
function cM(){S.modal=null;render();}
function cD(){S.det=null;render();}

// ── TABS ──────────────────────────────────────────────────────────────────────
function tDash(c){
  const unp=S.repairs.filter(r=>r.status==="Dhammaatay"&&r.payStatus==="La'aanta");
  const pnd=S.repairs.filter(r=>r.status!=="Dhammaatay");
  const spD=S.sups.filter(s=>s.buyType!=="kaash"&&Math.max(0,num(s.totalAmount)-sumP(s.payments))>0);
  return`
  <div class="sg">
    <div class="sc" style="border-top:3px solid #f59e0b"><span style="font-size:17px">🔧</span><div class="sv" style="color:#f59e0b">${pnd.length}</div><div class="sl">Farasmo</div></div>
    <div class="sc" style="border-top:3px solid #10b981"><span style="font-size:17px">💰</span><div class="sv" style="color:#10b981;font-size:11px">${fmt(c.rRev)}</div><div class="sl">Dakhli</div></div>
    <div class="sc" style="border-top:3px solid #ef4444"><span style="font-size:17px">⚠️</span><div class="sv" style="color:#ef4444;font-size:11px">${fmt(c.rOwe)}</div><div class="sl">Lama Suubin</div></div>
    <div class="sc" style="border-top:3px solid #22d3ee"><span style="font-size:17px">📱</span><div class="sv" style="color:#22d3ee">${c.ipSt}</div><div class="sl">iPhone Stock</div></div>
    <div class="sc" style="border-top:3px solid #4ade80"><span style="font-size:17px">📈</span><div class="sv" style="color:#4ade80;font-size:11px">${fmt(c.sRev-c.sCst)}</div><div class="sl">Faa'iido</div></div>
    <div class="sc" style="border-top:3px solid #fb923c"><span style="font-size:17px">🏪</span><div class="sv" style="color:#fb923c;font-size:11px">${fmt(c.spOw)}</div><div class="sl">Deyn Sup</div></div>
  </div>
  <div class="ag">
    <button class="ab" style="background:#b45309" onclick="oM('repair')">🔧 Farasmo</button>
    <button class="ab" style="background:#065f46" onclick="oM('sale')">💰 Gadi</button>
    <button class="ab" style="background:#1d4ed8" onclick="oM('addItem')">📦 Badeeco</button>
    <button class="ab" style="background:#6d28d9" onclick="oM('addIphone')">📱 iPhone</button>
    <button class="ab" style="background:#be185d" onclick="oM('custDebt')">🤝 Deyn</button>

async function sbItem(){
  const n=$("in")?.value,co=num($("ico")?.value),se=num($("ise")?.value),q=num($("iq")?.value);
  if(!n||!co||!se||!q) return toast("❗ Buuxi goobaha muhiimka ah",true);
  if(se<=co) return toast("❗ Qiimaha iibku waa inuu sarreeyo costka",true);
  await fsAdd("inv",{name:n,category:$("ic")?.value,costPrice:co,sellPrice:se,qty:q,supplierName:$("isu")?.value||"",addedBy:S.user.name,date:tod()});
  cM();await loadAll();toast("✅ Badeeco la diiwaan geliyey!");
}
async function sbIph(){
  const m=$("ipm")?.value,co=num($("ipco")?.value),se=num($("ipse")?.value);
  if(!m||m==="--Dooro--"||!co||!se) return toast("❗ Buuxi goobaha muhiimka ah",true);
  await fsAdd("iphones",{model:m,storage:$("ips")?.value||"",color:$("ipc")?.value||"",imei:$("ipi")?.value||"",costPrice:co,sellPrice:se,condition:$("ipcd")?.value||"Cusub",supplierName:$("ipsu")?.value||"",status:"Jira",addedBy:S.user.name,date:tod()});
  cM();await loadAll();toast("✅ iPhone stock la diiwaan geliyey!");
}
async function sbSale(){
  const cn=$("scn")?.value||"Macmiil",cp=$("scp")?.value||"",da=num($("sda")?.value);
  if(_sT==="item"){
    const iid=$("sii")?.value,it=S.inv.find(i=>i._id===iid),q=num($("sq")?.value||1);
    if(!it) return toast("❗ Dooro badeecad",true);
    if(q<1||q>num(it.qty)) return toast("❗ Tiro khaldan",true);
    const tc=num(it.costPrice)*q,tp=num(it.sellPrice)*q,deyn=_sP==="deyn"?da:0,paid=tp-deyn;
    await fsAdd("sales",{saleType:"item",itemName:it.name,category:it.category,qty:q,totalCost:tc,totalPrice:tp,paid,deyn,custName:cn,custPhone:cp,payType:_sP,soldBy:S.user.name,date:tod()});
    await fsUpdate("inv",iid,{qty:num(it.qty)-q});
    if(_sP==="deyn"&&deyn>0) await fsAdd("debts",{custName:cn,phone:cp,item:it.name,totalAmount:tp,paidAmount:paid,notes:"Iibka",date:tod(),addedBy:S.user.name,payments:[]});
  } else {
    const ipid=$("sip")?.value,ip=S.iphones.find(i=>i._id===ipid);
    if(!ip) return toast("❗ Dooro iPhone",true);
    const deyn=_sP==="deyn"?da:0,paid=num(ip.sellPrice)-deyn;
    const nm=`${ip.model} ${ip.storage||""} ${ip.color||""}`.trim();
    await fsAdd("sales",{saleType:"iphone",itemName:nm,category:"📱 iPhone Celis",qty:1,totalCost:num(ip.costPrice),totalPrice:num(ip.sellPrice),paid,deyn,custName:cn,custPhone:cp,payType:_sP,soldBy:S.user.name,date:tod()});
    await fsUpdate("iphones",ipid,{status:"La Gadaa",soldDate:tod(),soldBy:S.user.name,soldTo:cn});
    if(_sP==="deyn"&&deyn>0) await fsAdd("debts",{custName:cn,phone:cp,item:nm,totalAmount:num(ip.sellPrice),paidAmount:paid,notes:"iPhone Iib",date:tod(),addedBy:S.user.name,payments:[]});
  }
  cM();await loadAll();toast("✅ Iibka la diiwaan geliyey!");
}
async function sbDebt(){
  const n=$("dn")?.value,i=$("di")?.value,t=num($("dt")?.value);
  if(!n||!i||!t) return toast("❗ Buuxi goobaha muhiimka ah",true);
  await fsAdd("debts",{custName:n,phone:$("dp")?.value||"",item:i,totalAmount:t,paidAmount:num($("dpa")?.value||0),notes:"",date:tod(),addedBy:S.user.name,payments:[]});
  cM();await loadAll();toast("✅ Deynta la diiwaan geliyey!");
}
async function sbSup(){
  const co=$("spco")?.value,it=$("spit")?.value,q=num($("spq")?.value),u=num($("spu")?.value);
  if(!co||!it||!q||!u) return toast("❗ Buuxi goobaha muhiimka ah",true);
  const tot=q*u;
  let pn=0;
  if(_spP==="kaash") pn=tot;
  else if(_spP==="qayb") pn=num($("sppn")?.value);
  const initP=pn>0?[{amount:pn,note:"Hordhac",date:tod(),by:S.user.name}]:[];
  await fsAdd("sups",{companyName:co,contactName:$("spcn")?.value||"",phone:$("spph")?.value||"",itemDesc:it,category:$("spca")?.value,qty:q,unitCost:u,totalAmount:tot,buyType:_spP,notes:$("spnt")?.value||"",date:tod(),addedBy:S.user.name,payments:initP});
  cM();await loadAll();toast("✅ Supplier la diiwaan geliyey!");
}
function sbChPin(){
  const c=$("cpc")?.value,n=$("cpn")?.value,x=$("cpx")?.value;
  if(!c||!n||!x) return toast("❗ Buuxi dhammaan goobaha",true);
  if(c!==S.user.pin) return toast("❗ PIN-ka hadda jira waa khaldan yahay",true);
  if(n.length<4) return toast("❗ PIN-ku waa inuu ahaadaa 4 tiro",true);
  if(n!==x) return toast("❗ PIN-yada cusub kuma heshiiyaan",true);
  const u=USERS.find(x=>x.id===S.user.id);
  if(u){u.pin=n;S.user.pin=n;}
  cM();toast("✅ PIN-ka waa la beddelay!");
}
function sbRstPin(){
  const uid=$("rpu")?.value,n=$("rpn")?.value,x=$("rpx")?.value;
  if(!uid||!n||!x) return toast("❗ Buuxi dhammaan goobaha",true);
  if(n.length<4) return toast("❗ PIN-ku waa inuu ahaadaa 4 tiro",true);
  if(n!==x) return toast("❗ PIN-yada cusub kuma heshiiyaan",true);
  const u=USERS.find(u=>u.id===uid);
  if(u){u.pin=n;}
  cM();toast("✅ PIN-ka "+(u?.name||"")+" waa la beddelay!");
}

// ── DETAIL VIEWS ──────────────────────────────────────────────────────────────
function dWrap(d){
  if(d.type==="repair") return detR(d.id);
  if(d.type==="debt")   return detD(d.id);
  if(d.type==="sup")    return detS(d.id);
  return "";
}
function mkOv(title,content){
  return`<div class="ov" onclick="if(event.target===this)cD()">
    <div class="modal"><div class="mh"><span class="mt">${title}</span><button class="xbtn" onclick="cD()">✕</button></div>
    <div class="mb">${content}</div></div>
  </div>`;
}
function dr(l,v,c=""){return`<div class="dr"><span class="dl">${l}</span><span class="dv" style="color:${c||"#f1f5f9"}">${v||"—"}</span></div>`;}
function pyH(payments,total){
  const pd=sumP(payments);
  return`<div style="margin-top:10px">
    <div class="lbl">Taariikhda Lacag Bixinta</div>
    ${payments.map(p=>`<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #1a1a1a;flex-wrap:wrap;gap:3px"><span style="color:#64748b">📅 ${p.date||tod()} 👤 ${p.by||"?"}</span><span style="color:#4ade80;font-weight:700">${fmt(p.amount)}</span>${p.note?`<span style="color:#475569;font-size:10px;width:100%">(${p.note})</span>`:""}</div>`).join("")}
    <div style="display:flex;justify-content:space-between;padding:6px 0;font-weight:700;font-size:13px"><span style="color:#94a3b8">La Bixiyay:</span><span style="color:#22d3ee">${fmt(pd)}</span></div>
    <div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span style="color:#94a3b8">Dhiman:</span><span style="color:${pd>=num(total)?"#4ade80":"#f472b6"}">${fmt(Math.max(0,num(total)-pd))}</span></div>
  </div>`;
}

function detR(id){
  const r=S.repairs.find(x=>x._id===id); if(!r) return "";
  const pd=sumP(r.payments);
  return mkOv("📋 Farasmo Faahfaahin",`
    <div class="dg">
      ${dr("Macmiilka",r.customerName)}${dr("Telefoon",r.phone)}${dr("Model",r.model)}
      ${r.color?dr("Midab",r.color):""}${r.imei?dr("IMEI",r.imei):""}
      ${dr("Dhibaatada",r.repairType)}${r.password?dr("Password",r.password):""}
      ${dr("Lacagta",r.isChecking?"Checking":fmt(r.price),r.isChecking?"#818cf8":"#fbbf24")}
      ${dr("Lacag Bixin",r.payStatus,r.payStatus==="Suubiyay"?"#4ade80":"#ef4444")}
      ${dr("Xaaladda",r.status)}${dr("Keenay",r.receivedDate)}${dr("Qabtay",r.receivedBy)}
      ${r.doneDate?dr("La Dhammaystay",r.doneDate):""}
      ${r.givenBy?dr("Siiyay",r.givenBy):""}${r.givenDate?dr("Taariikhda Qaatay",r.givenDate):""}
      ${r.notes?dr("Faallo",r.notes):""}
    </div>
    ${r.status!=="Dhammaatay"?`<div style="margin-top:8px"><div class="lbl">Cusboonaysii Xaaladda</div><div class="stbs">
      <button class="stb" style="background:#92400e" onclick="updRS('${r._id}','Socota')">🔧 Socota</button>
      <button class="stb" style="background:#065f46" onclick="updRS('${r._id}','Dhammaatay')">✅ Dhammaatay</button>
    </div></div>`:""}
    ${r.status==="Dhammaatay"&&!r.givenBy?`<div style="margin-top:8px"><div class="lbl">Cidda Mobilka Siisay</div>
      <select class="inp" id="gvs"><option value="">--Dooro--</option>${USERS.map(u=>`<option value="${u.name}">${u.av} ${u.name}</option>`).join("")}</select>
      <button class="fbtn" style="background:#1d4ed8;color:#fff;margin-top:6px" onclick="setGv('${r._id}')">✅ Xaqiiji</button></div>`:""}
    ${!r.isChecking&&r.payStatus==="La'aanta"?`
      <button class="fbtn" style="background:#065f46;color:#fff;margin-top:8px" onclick="mkPd('${r._id}')">💰 Lacagta Waa La Suubiyay (Full)</button>
      <div class="pybox" style="margin-top:10px">
        <div class="lbl">💳 Dejin Lacag (Qayb)</div>
        <div class="g2">${F("Qadarka ($)","rpa","50","number")}${F("Faallo","rpn","...")}</div>
        <button class="fbtn" style="background:#1d4ed8;color:#fff;margin-top:4px" onclick="addRP('${r._id}')">➕ Ku Dar</button>
      </div>`:""}
    ${pd>0?pyH(r.payments,r.price):""}
  `);
}

function detD(id){
  const d=S.debts.find(x=>x._id===id); if(!d) return "";
  const rm=Math.max(0,num(d.totalAmount)-num(d.paidAmount));
  return mkOv("🤝 Macmiil Deyn",`
    <div class="dg">
      ${dr("Macmiilka",d.custName)}${d.phone?dr("Telefoon",d.phone):""}
      ${dr("Alaabta",d.item)}${dr("Deynta",fmt(d.totalAmount),"#f472b6")}
      ${dr("La Bixiyay",fmt(d.paidAmount),"#4ade80")}
      ${dr("Dhiman",fmt(rm),rm>0?"#ef4444":"#4ade80")}${dr("Taariikhda",d.date)}
    </div>
    <div class="pybox" style="margin-top:10px">
      <div class="lbl">💳 Ku Dar Lacag Bixin</div>
      <div class="g2">${F("Qadarka ($)","dpa","50","number")}${F("Faallo","dpn","...")}</div>
      <button class="fbtn" style="background:#be185d;color:#fff;margin-top:4px" onclick="addDP('${d._id}')">➕ Ku Dar</button>
    </div>
    ${sumP(d.payments)>0?pyH(d.payments,d.totalAmount):""}
  `);
}

function detS(id){
  const s=S.sups.find(x=>x._id===id); if(!s) return "";
  const tc=num(s.totalAmount),pd=sumP(s.payments),rm=Math.max(0,tc-pd),pct=tc>0?Math.min(100,Math.round(pd/tc*100)):100;
  return mkOv("🏪 Supplier Faahfaahin",`
    <div class="dg">
      ${dr("Shirkadda",s.companyName)}${s.contactName?dr("Xiriiriyaha",s.contactName):""}${s.phone?dr("Telefoon",s.phone):""}
      ${dr("Alaabta",s.itemDesc)}${dr("Tirada",s.qty+" qaybood")}
      ${dr("Cost/Qaybood",fmt(s.unitCost),"#94a3b8")}${dr("Wadarta",fmt(tc),"#fbbf24")}
      ${dr("Nooca Bixin",s.buyType==="kaash"?"💵 Kaash Buuxa":s.buyType==="qayb"?"💳 Qayb+Deyn":"📋 Deyn Buuxa",s.buyType==="kaash"?"#10b981":"#fb923c")}
      ${dr("La Bixiyay",fmt(pd),"#4ade80")}${dr("Dhiman",fmt(rm),rm>0?"#fb923c":"#4ade80")}
      ${dr("Taariikhda",s.date)}
    </div>
    ${s.buyType!=="kaash"&&rm>0?`
    <div style="margin:8px 0">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:3px"><span>La bixiyay</span><span>${pct}%</span></div>
      <div class="pgbar"><div class="pgfil" style="width:${pct}%"></div></div>
    </div>
    <div class="pybox">
      <div class="lbl">💳 Ku Dar Lacag Bixin (Hadba Meesha Aad Joogto)</div>
      <div class="g2">${F("Qadarka ($)","sppa","Hadba waad geli kartaa","number")}${F("Taariikhda","sppd",tod(),"text",tod())}</div>
      ${F("Faallo","sppn","Tusaale: maalin dambe...")}
      <button class="fbtn" style="background:#0e7490;color:#fff;margin-top:4px" onclick="addSP('${s._id}')">➕ Ku Dar Lacagta</button>
    </div>`:""}
    ${rm<=0&&s.buyType!=="kaash"?`<div class="hint" style="margin-top:10px;text-align:center">✅ Wadarta lacagta waa la bixiyay!</div>`:""}
    ${pd>0?pyH(s.payments,tc):""}
  `);
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
async function updRS(id,st){
  await fsUpdate("repairs",id,{status:st,doneDate:st==="Dhammaatay"?tod():""});
  await loadAll();toast("✅ Xaaladda la cusboonaysiiyey");
}
async function setGv(id){
  const v=$("gvs")?.value; if(!v)return;
  await fsUpdate("repairs",id,{givenBy:v,givenDate:tod()});
  await loadAll();toast("✅ La xaqiijiyey");
}
async function mkPd(id){
  await fsUpdate("repairs",id,{payStatus:"Suubiyay"});
  await loadAll();toast("✅ Lacagta la suubiyay");
}
async function addRP(id){
  const a=num($("rpa")?.value),n=$("rpn")?.value||"";
  if(!a) return toast("❗ Geli qadarka",true);
  const r=S.repairs.find(x=>x._id===id);
  await fsUpdate("repairs",id,{payments:[...(r?.payments||[]),{amount:a,note:n,date:tod(),by:S.user.name}]});
  await loadAll();toast("✅ Dejin la diiwaan geliyey");
}
async function addDP(id){
  const a=num($("dpa")?.value),n=$("dpn")?.value||"";
  if(!a) return toast("❗ Geli qadarka",true);
  const d=S.debts.find(x=>x._id===id);
  await fsUpdate("debts",id,{paidAmount:num(d.paidAmount)+a,payments:[...(d?.payments||[]),{amount:a,note:n,date:tod(),by:S.user.name}]});
  await loadAll();toast("✅ Lacag bixin la diiwaan geliyey");
}
async function addSP(id){
  const a=num($("sppa")?.value),dt=$("sppd")?.value||tod(),n=$("sppn")?.value||"";
  if(!a) return toast("❗ Geli qadarka",true);
  const s=S.sups.find(x=>x._id===id);
  await fsUpdate("sups",id,{payments:[...(s?.payments||[]),{amount:a,note:n,date:dt,by:S.user.name}]});
  await loadAll();toast("✅ Lacag bixin la diiwaan geliyey!");
}

// ── START ─────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
