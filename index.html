<div id="app">
  <div class="loading">
    <div style="width:80px;height:80px;border-radius:50%;border:3px solid #c9a227;background:#111;display:flex;align-items:center;justify-content:center;font-size:32px">📱</div>
    <div style="color:#c9a227;font-size:18px;font-weight:900">Ramadan iPhone</div>

    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
</div>

<script type="module">
const FB = {
  apiKey:"AIzaSyAhF3rENrkIud502v2q9F1XUtSExM39Q2I",
  authDomain:"ramadaniphone-510fb.firebaseapp.com",
  projectId:"ramadaniphone-510fb",
  storageBucket:"ramadaniphone-510fb.firebasestorage.app",
  messagingSenderId:"877384103070",
  appId:"1:877384103070:web:41799e223dbca63f86378f"
};
firebase.initializeApp(FB);
const db = firebase.firestore();
const TS = () => firebase.firestore.FieldValue.serverTimestamp();

const USERS=[
  {id:"owner",name:"Owner",role:"owner",pin:"0000",av:"👑"},
  {id:"w1",name:"Worker 1",role:"tech",pin:"1111",av:"🔧"},
  {id:"w2",name:"Worker 2",role:"tech",pin:"2222",av:"🔧"},
  {id:"w3",name:"Worker 3",role:"tech",pin:"3333",av:"🔧"},
];
const IMODELS=["iPhone 6","iPhone 6S","iPhone 7","iPhone 7 Plus","iPhone 8","iPhone 8 Plus","iPhone X","iPhone XS","iPhone XS Max","iPhone XR","iPhone 11","iPhone 11 Pro","iPhone 11 Pro Max","iPhone 12","iPhone 12 Mini","iPhone 12 Pro","iPhone 12 Pro Max","iPhone 13","iPhone 13 Mini","iPhone 13 Pro","iPhone 13 Pro Max","iPhone 14","iPhone 14 Plus","iPhone 14 Pro","iPhone 14 Pro Max","iPhone 15","iPhone 15 Plus","iPhone 15 Pro","iPhone 15 Pro Max","iPhone 16","iPhone 16 Plus","iPhone 16 Pro","iPhone 16 Pro Max","Kale"];
const RTYPES=["Shaashadda (Screen)","Batariyada","Camera","Charging Port","Badhanka Home","Badhanka Dhinaca","Speaker","Microphone","Face ID","Back Glass","Motherboard","Biyo galay","Checking kaliya","Kale"];
const ICATS=["📱 iPhone Celis","🎧 Earphones","⚡ Charger","🛡️ Screen Protector","📦 Case","🔋 Battery","🔩 Spare Part","🔁 Kale"];

const $ = id => document.getElementById(id);
const fmt = n => "$"+Number(n||0).toLocaleString();
const num = n => Number(n||0);
const gid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const td = () => new Date().toLocaleDateString("en-GB");
const sumP = (arr) => (arr||[]).reduce((s,p)=>s+num(p.amount),0);

// State
const S = {
  user:null, tab:"dash", modal:null, detail:null,
  search:"", stockView:"items",
  repairs:[], inventory:[], iphones:[], sales:[], debts:[], suppliers:[],
  loaded:0
};

// Firestore
const COLS = ["repairs","inventory","iphones","sales","debts","suppliers"];
COLS.forEach(col=>{
  db.collection(col).orderBy("_ts","desc").onSnapshot(snap=>{
    S[col]=snap.docs.map(d=>({...d.data(),_id:d.id}));
    S.loaded++;
    draw();
  },()=>{S.loaded++;draw();});
});

const aDoc=(col,data)=>db.collection(col).add({...data,_ts:TS()});
const uDoc=(col,id,data)=>db.collection(col).doc(id).update(data);

// Toast
function toast(msg,err=false){
  const old=$("_toast"); if(old)old.remove();
  const t=document.createElement("div");
  t.id="_toast"; t.className="toast";
  t.style.borderColor=err?"#ef4444":"#c9a227";
  t.style.border="1px solid";
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

// DRAW
function draw(){
  const app=$("app");
  if(S.loaded<COLS.length){
    app.innerHTML=`<div class="loading"><div style="width:80px;height:80px;border-radius:50%;border:3px solid #c9a227;background:#111;display:flex;align-items:center;justify-content:center;font-size:32px">📱</div><div style="color:#c9a227;font-size:18px;font-weight:900">Ramadan iPhone</div><div style="color:#78716c;font-size:13px">Xogta la soo rarayo...</div><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    return;
  }
  if(!S.user){drawLogin();return;}
  drawApp();
}

// ── LOGIN ────────────────────────────────────────────────────────────────────
let selUser=null;
function drawLogin(){
  $("app").innerHTML=`<div class="login-bg"><div class="login-card">
    <div class="login-logo" style="display:flex;align-items:center;justify-content:center;font-size:36px">📱</div>
    <div class="login-title">Ramadan iPhone</div>
    <div class="login-sub">Electronic & Repair</div>
    <div class="lbl">Cidda aad tahay dooro:</div>
    <div class="user-grid">${USERS.map(u=>`<button class="u-btn" onclick="selU('${u.id}')"><span class="av">${u.av}</span>${u.name}</button>`).join("")}</div>
    <div id="pin-area" style="display:none;flex-direction:column;gap:10px">
      <div class="lbl">PIN (4 tiro):</div>
      <input class="pin-inp" id="pin-i" type="password" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')doLogin()">
      <div id="pin-err" style="color:#ef4444;text-align:center;font-size:13px;display:none">❗ PIN khaldan!</div>
      <button class="full-btn" style="background:linear-gradient(135deg,#c9a227,#a07a10);color:#000" onclick="doLogin()">🔓 Gal Nidaamka</button>
    </div>
  </div></div>`;
}
window.selU=id=>{
  selUser=USERS.find(u=>u.id===id);
  document.querySelectorAll(".u-btn").forEach(b=>b.classList.remove("sel"));
  document.querySelectorAll(".u-btn").forEach(b=>{if(b.textContent.includes(selUser.name))b.classList.add("sel");});
  $("pin-area").style.display="flex";
  $("pin-i").value="";
  $("pin-err").style.display="none";
  setTimeout(()=>$("pin-i").focus(),100);
};
window.doLogin=()=>{
  if(!selUser)return;
  if($("pin-i").value===selUser.pin){S.user=selUser;draw();}
  else{$("pin-err").style.display="block";$("pin-i").value="";}
};

// ── COMPUTED ─────────────────────────────────────────────────────────────────
function calc(){
  const rRev=S.repairs.filter(r=>r.status==="Dhammaatay"&&r.payStatus==="Suubiyay").reduce((s,r)=>s+num(r.price),0);
  const rOwe=S.repairs.filter(r=>r.status==="Dhammaatay"&&r.payStatus==="La'aanta").reduce((s,r)=>s+num(r.price),0);
  const sRev=S.sales.reduce((s,x)=>s+num(x.totalPrice),0);
  const sCst=S.sales.reduce((s,x)=>s+num(x.totalCost),0);
  const dTot=S.debts.reduce((s,c)=>s+Math.max(0,num(c.totalAmount)-num(c.paidAmount)),0);
  const spOwe=S.suppliers.filter(s=>s.buyType!=="kaash").reduce((s,x)=>s+Math.max(0,num(x.totalAmount)-sumP(x.payments)),0);
  return{rRev,rOwe,sRev,sCst,sProfit:sRev-sCst,dTot,spOwe,ipStock:S.iphones.filter(i=>i.status==="Jira").length};
}

// ── APP ───────────────────────────────────────────────────────────────────────
function drawApp(){
  const c=calc();
  const TABS=[{id:"dash",ic:"📊",lb:"Guud"},{id:"repairs",ic:"🔧",lb:"Farasmo"},{id:"stock",ic:"📦",lb:"Stock"},{id:"sales",ic:"💰",lb:"Iib"},{id:"debts",ic:"🤝",lb:"Deyn"},{id:"sup",ic:"🏪",lb:"Supplier"}];
  let body="";
  if(S.tab==="dash")body=dashTab(c);
  else if(S.tab==="repairs")body=repairsTab();
  else if(S.tab==="stock")body=stockTab();
  else if(S.tab==="sales")body=salesTab(c);
  else if(S.tab==="debts")body=debtsTab(c);
  else if(S.tab==="sup")body=supTab(c);

  $("app").innerHTML=`
  <div class="topbar">
    <div class="logo" style="display:flex;align-items:center;justify-content:center;font-size:20px">📱</div>
    <div><div class="shop-name">Ramadan iPhone</div><div class="shop-sub">Electronic & Repair</div></div>
    <div class="user-chip"><span style="font-size:8px;color:#4ade80">🟢</span><span>${S.user.av}</span><span style="font-size:11px">${S.user.name}</span><button class="logout-btn" onclick="S.user=null;draw()">✕</button></div>
  </div>
  <div class="body">${body}</div>
  <div class="nav">${TABS.map(t=>`<button class="nav-btn ${S.tab===t.id?"active":""}" onclick="goTab('${t.id}')"><span class="icon">${t.ic}</span>${t.lb}</button>`).join("")}</div>
  ${S.modal?drawModal(S.modal):""}
  ${S.detail?drawDetail(S.detail):""}`;
}
window.goTab=id=>{S.tab=id;S.search="";draw();};
window.openModal=m=>{S.modal=m;draw();};
window.closeModal=()=>{S.modal=null;draw();};
window.closeDetail=()=>{S.detail=null;draw();};

// ── DASH ──────────────────────────────────────────────────────────────────────
function dashTab(c){
  const unp=S.repairs.filter(r=>r.status==="Dhammaatay"&&r.payStatus==="La'aanta");
  const pnd=S.repairs.filter(r=>r.status!=="Dhammaatay");
  const spDeyn=S.suppliers.filter(s=>s.buyType!=="kaash"&&Math.max(0,num(s.totalAmount)-sumP(s.payments))>0);
  return`
  <div class="stats-grid">
    <div class="stat-card" style="border-top:3px solid #f59e0b"><span style="font-size:17px">🔧</span><div class="stat-val" style="color:#f59e0b">${pnd.length}</div><div class="stat-lbl">Farasmo Jira</div></div>
    <div class="stat-card" style="border-top:3px solid #10b981"><span style="font-size:17px">💰</span><div class="stat-val" style="color:#10b981;font-size:11px">${fmt(c.rRev)}</div><div class="stat-lbl">Dakhli Farasmo</div></div>
    <div class="stat-card" style="border-top:3px solid #ef4444"><span style="font-size:17px">⚠️</span><div class="stat-val" style="color:#ef4444;font-size:11px">${fmt(c.rOwe)}</div><div class="stat-lbl">Lama Suubin</div></div>
    <div class="stat-card" style="border-top:3px solid #22d3ee"><span style="font-size:17px">📱</span><div class="stat-val" style="color:#22d3ee">${c.ipStock}</div><div class="stat-lbl">iPhone Stock</div></div>
    <div class="stat-card" style="border-top:3px solid #4ade80"><span style="font-size:17px">📈</span><div class="stat-val" style="color:#4ade80;font-size:11px">${fmt(c.sProfit)}</div><div class="stat-lbl">Faa'iido Iibka</div></div>
    <div class="stat-card" style="border-top:3px solid #fb923c"><span style="font-size:17px">🏪</span><div class="stat-val" style="color:#fb923c;font-size:11px">${fmt(c.spOwe)}</div><div class="stat-lbl">Deyn Supplier</div></div>
  </div>
  <div class="act-grid">
    <button class="act-btn" style="background:#b45309" onclick="openModal('repair')">🔧 Farasmo</button>
    <button class="act-btn" style="background:#065f46" onclick="openModal('sale')">💰 Gadi</button>
    <button class="act-btn" style="background:#1d4ed8" onclick="openModal('addItem')">📦 Badeeco</button>
    <button class="act-btn" style="background:#6d28d9" onclick="openModal('addIphone')">📱 iPhone</button>
    <button class="act-btn" style="background:#be185d" onclick="openModal('custDebt')">🤝 Deyn</button>
    <button class="act-btn" style="background:#0e7490" onclick="openModal('supplier')">🏪 Supplier</button>
  </div>
  <div class="sec-title">⚠️ Farasmo Aan La Suubin</div>
  ${unp.length===0?empty("Dhammaanba waa la suubiyay ✓"):unp.slice(0,3).map(r=>rCard(r)).join("")}
  <div class="sec-title">🏪 Supplier Deyn</div>

// Sale type toggle
let saleType="item", salePay="kaash";
window.setSaleType=t=>{
  saleType=t;
  $("s-item-sec").style.display=t==="item"?"block":"none";
  $("s-ip-sec").style.display=t==="iphone"?"block":"none";
  $("st-item").classList.toggle("active",t==="item");
  $("st-ip").classList.toggle("active",t==="iphone");
};
window.setSalePay=t=>{
  salePay=t;
  $("s-deyn-sec").style.display=t==="deyn"?"flex":"none";
  if($("s-deyn-sec"))$("s-deyn-sec").style.flexDirection="column";
  $("sp-kaash").classList.toggle("active",t==="kaash");
  $("sp-deyn").classList.toggle("active",t==="deyn");
};

// Supplier pay type
let spPayType="deyn";
window.setSpPay=t=>{
  spPayType=t;
  ["kaash","deyn","qayb"].forEach(x=>{
    const el=$(`bt-${x}`); const sec=$(`sp-${x}-sec`);
    if(el)el.classList.toggle("active",t===x);
    if(sec)sec.style.display=t===x?"block":"none";
  });
};

// Auto-hint for item cost/sell
document.addEventListener("input",e=>{
  if(["i-cost","i-sell"].includes(e.target.id)){
    const c=num($("i-cost")?.value), s=num($("i-sell")?.value);
    const h=$("i-hint");
    if(h&&c&&s) h.innerHTML=s>c?`<div class="hint">📈 Faa'iido/qaybood: <b style="color:#4ade80">${fmt(s-c)}</b></div>`:`<div class="hint" style="color:#ef4444">❗ Qiimaha iibku waa inuu ka sarreeyo costka</div>`;
  }
  if(["sp-qty","sp-unit","sp-paid-now"].includes(e.target.id)){
    const qty=num($("sp-qty")?.value), uc=num($("sp-unit")?.value);
    const tot=qty*uc;
    const h=$("sp-total-hint");
    if(h&&tot>0) h.innerHTML=`<div class="hint">💰 Wadarta: <b style="color:#fbbf24">${fmt(tot)}</b></div>`;
    const ph=$("sp-qayb-hint");
    const pn=num($("sp-paid-now")?.value);
    if(ph&&tot>0) ph.innerHTML=`💳 Hadda la bixiyay: <b style="color:#4ade80">${fmt(pn)}</b> — Dhiman: <b style="color:#fb923c">${fmt(Math.max(0,tot-pn))}</b>`;
  }
});

window.submitRepair=async()=>{
  const name=$("r-name")?.value, phone=$("r-phone")?.value, model=$("r-model")?.value, rtype=$("r-rtype")?.value;
  if(!name||!phone||!model||!rtype||model==="--Dooro--"||rtype==="--Dooro--") return toast("❗ Buuxi goobaha muhiimka ah",true);
  await aDoc("repairs",{customerName:name,phone,model,repairType:rtype,password:$("r-pass")?.value||"",imei:$("r-imei")?.value||"",color:$("r-color")?.value||"",isChecking:$("r-check")?.checked||false,price:num($("r-price")?.value),notes:$("r-notes")?.value||"",status:$("r-status")?.value||"Sugaya",payStatus:"La'aanta",receivedBy:S.user.name,receivedDate:td(),doneDate:"",givenBy:"",givenDate:"",payments:[]});
  closeModal();toast("✅ Farasmo la diiwaan geliyey!");
};

window.submitItem=async()=>{
  const name=$("i-name")?.value, cost=num($("i-cost")?.value), sell=num($("i-sell")?.value), qty=num($("i-qty")?.value);
  if(!name||!cost||!sell||!qty) return toast("❗ Buuxi goobaha muhiimka ah",true);
  if(sell<=cost) return toast("❗ Qiimaha iibku waa inuu sarreeyo costka",true);
  await aDoc("inventory",{name,category:$("i-cat")?.value,costPrice:cost,sellPrice:sell,qty,supplierName:$("i-sup")?.value||"",addedBy:S.user.name,date:td()});
  closeModal();toast("✅ Badeeco la diiwaan geliyey!");
};

window.submitIphone=async()=>{
  const model=$("ip-model")?.value, cost=num($("ip-cost")?.value), sell=num($("ip-sell")?.value);
  if(!model||model==="--Dooro--"||!cost||!sell) return toast("❗ Buuxi goobaha muhiimka ah",true);
  await aDoc("iphones",{model,storage:$("ip-stor")?.value||"",color:$("ip-color")?.value||"",imei:$("ip-imei")?.value||"",costPrice:cost,sellPrice:sell,condition:$("ip-cond")?.value||"Cusub",supplierName:$("ip-sup")?.value||"",status:"Jira",addedBy:S.user.name,date:td()});
  closeModal();toast("✅ iPhone stock la diiwaan geliyey!");
};

window.submitSale=async()=>{
  const cust=$("s-cust")?.value||"Macmiil", cph=$("s-cph")?.value||"", deynAmt=num($("s-deyn")?.value);
  if(saleType==="item"){
    const itemId=$("s-itemId")?.value, qty=num($("s-qty")?.value||1);
    const it=S.inventory.find(i=>i._id===itemId);
    if(!it) return toast("❗ Dooro badeecad",true);
    if(qty<1||qty>num(it.qty)) return toast("❗ Tiro khaldan",true);
    const tc=num(it.costPrice)*qty, tp=num(it.sellPrice)*qty;
    const deyn=salePay==="deyn"?deynAmt:0, paid=tp-deyn;
    await aDoc("sales",{saleType:"item",itemName:it.name,category:it.category,qty,totalCost:tc,totalPrice:tp,paid,deyn,custName:cust,custPhone:cph,payType:salePay,soldBy:S.user.name,date:td()});
    await uDoc("inventory",itemId,{qty:num(it.qty)-qty});
    if(salePay==="deyn"&&deyn>0) await aDoc("debts",{custName:cust,phone:cph,item:it.name,totalAmount:tp,paidAmount:paid,notes:"Iibka",date:td(),addedBy:S.user.name,payments:[]});
  } else {
    const ipId=$("s-ipId")?.value, ip=S.iphones.find(i=>i._id===ipId);
    if(!ip) return toast("❗ Dooro iPhone",true);
    const deyn=salePay==="deyn"?deynAmt:0, paid=num(ip.sellPrice)-deyn;
    const nm=`${ip.model} ${ip.storage||""} ${ip.color||""}`.trim();
    await aDoc("sales",{saleType:"iphone",itemName:nm,category:"📱 iPhone Celis",qty:1,totalCost:num(ip.costPrice),totalPrice:num(ip.sellPrice),paid,deyn,custName:cust,custPhone:cph,payType:salePay,soldBy:S.user.name,date:td()});
    await uDoc("iphones",ipId,{status:"La Gadaa",soldDate:td(),soldBy:S.user.name,soldTo:cust});
    if(salePay==="deyn"&&deyn>0) await aDoc("debts",{custName:cust,phone:cph,item:nm,totalAmount:num(ip.sellPrice),paidAmount:paid,notes:"iPhone Iib",date:td(),addedBy:S.user.name,payments:[]});
  }
  closeModal();toast("✅ Iibka la diiwaan geliyey!");
};

window.submitDebt=async()=>{
  const name=$("d-name")?.value, item=$("d-item")?.value, tot=num($("d-tot")?.value);
  if(!name||!item||!tot) return toast("❗ Buuxi goobaha muhiimka ah",true);
  await aDoc("debts",{custName:name,phone:$("d-phone")?.value||"",item,totalAmount:tot,paidAmount:num($("d-paid")?.value||0),notes:$("d-note")?.value||"",date:td(),addedBy:S.user.name,payments:[]});
  closeModal();toast("✅ Deynta la diiwaan geliyey!");
};

window.submitSupplier=async()=>{
  const co=$("sp-co")?.value, item=$("sp-item")?.value, qty=num($("sp-qty")?.value), uc=num($("sp-unit")?.value);
  if(!co||!item||!qty||!uc) return toast("❗ Buuxi goobaha muhiimka ah",true);
  const total=qty*uc;
  let paidNow=0;
  if(spPayType==="kaash") paidNow=total;
  else if(spPayType==="qayb") paidNow=num($("sp-paid-now")?.value);
  const initPayments=paidNow>0?[{amount:paidNow,note:"Hordhac",date:td(),by:S.user.name}]:[];
  await aDoc("suppliers",{companyName:co,contactName:$("sp-cnt")?.value||"",phone:$("sp-ph")?.value||"",itemDesc:item,category:$("sp-cat")?.value,qty,unitCost:uc,totalAmount:total,buyType:spPayType,notes:$("sp-note")?.value||"",date:td(),addedBy:S.user.name,payments:initPayments});
  closeModal();toast("✅ Supplier la diiwaan geliyey!");
};

// ── DETAIL VIEWS ──────────────────────────────────────────────────────────────
function drawDetail(d){
  if(d.type==="repair") return detailRepair(d.id);
  if(d.type==="debt") return detailDebt(d.id);
  if(d.type==="sup") return detailSupplier(d.id);
  return "";
}

function detailRepair(id){
  const r=S.repairs.find(x=>x._id===id); if(!r)return "";
  const paid=sumP(r.payments);
  return mWrap("📋 Farasmo Faahfaahin",`
    <div class="det-grid">
      ${dr("Macmiilka",r.customerName)}${dr("Telefoon",r.phone)}${dr("Model",r.model)}
      ${r.color?dr("Midab",r.color):""}${r.imei?dr("IMEI",r.imei):""}
      ${dr("Dhibaatada",r.repairType)}${r.password?dr("Password",r.password):""}
      ${dr("Lacagta",r.isChecking?"Checking":fmt(r.price),r.isChecking?"#818cf8":"#fbbf24")}
      ${dr("Lacag Bixin",r.payStatus,r.payStatus==="Suubiyay"?"#4ade80":"#ef4444")}
      ${dr("Xaaladda",r.status)}${dr("Keenay",r.receivedDate)}${dr("Qabtay",r.receivedBy)}
      ${r.doneDate?dr("La Dhammaystay",r.doneDate):""}
      ${r.givenBy?dr("Siiyay",r.givenBy):""}${r.givenDate?dr("Taariikhda Qaatay",r.givenDate):""}
      ${r.notes?dr("Faallo",r.notes):""}
    </div>
    ${r.status!=="Dhammaatay"?`<div style="margin-top:8px"><div class="lbl">Cusboonaysii Xaaladda</div><div class="st-btns">
      <button class="st-btn" style="background:#92400e" onclick="updRS('${r._id}','Socota')">🔧 Socota</button>
      <button class="st-btn" style="background:#065f46" onclick="updRS('${r._id}','Dhammaatay')">✅ Dhammaatay</button>
    </div></div>`:""}
    ${r.status==="Dhammaatay"&&!r.givenBy?`<div style="margin-top:8px"><div class="lbl">Cidda Mobilka Siisay</div>
      <select class="inp" id="giv-sel"><option value="">--Dooro--</option>${USERS.map(u=>`<option value="${u.name}">${u.av} ${u.name}</option>`).join("")}</select>
      <button class="full-btn" style="background:#1d4ed8;color:#fff;margin-top:6px" onclick="setGiver('${r._id}')">✅ Xaqiiji</button>
    </div>`:""}
    ${!r.isChecking&&r.payStatus==="La'aanta"?`<button class="full-btn" style="background:#065f46;color:#fff;margin-top:8px" onclick="markPaid('${r._id}')">💰 Lacagta Waa La Suubiyay (Full)</button>
    <div class="pay-box" style="margin-top:10px">
      <div class="lbl">💳 Dejin Lacag (Qayb)</div>
      <div class="g2">${fld("Qadarka ($)","rp-amt","50","number")}${fld("Faallo","rp-note","...")}</div>
      <button class="full-btn" style="background:#1d4ed8;color:#fff;margin-top:4px" onclick="addRPay('${r._id}')">➕ Ku Dar</button>
    </div>`:""}
    ${paid>0?payHistory(r.payments,r.price):""}
  `);
}

function detailDebt(id){
  const d=S.debts.find(x=>x._id===id); if(!d)return "";
  const rem=Math.max(0,num(d.totalAmount)-num(d.paidAmount));
  return mWrap("🤝 Macmiil Deyn",`
    <div class="det-grid">
      ${dr("Macmiilka",d.custName)}${d.phone?dr("Telefoon",d.phone):""}
      ${dr("Alaabta",d.item)}${dr("Deynta",fmt(d.totalAmount),"#f472b6")}
      ${dr("La Bixiyay",fmt(d.paidAmount),"#4ade80")}
      ${dr("Dhiman",fmt(rem),rem>0?"#ef4444":"#4ade80")}
      ${dr("Taariikhda",d.date)}
    </div>
    <div class="pay-box" style="margin-top:10px">
      <div class="lbl">💳 Ku Dar Lacag Bixin</div>
      <div class="g2">${fld("Qadarka ($)","dp-amt","50","number")}${fld("Faallo","dp-note","...")}</div>
      <button class="full-btn" style="background:#be185d;color:#fff;margin-top:4px" onclick="addDPay('${d._id}')">➕ Ku Dar</button>
    </div>
    ${sumP(d.payments)>0?payHistory(d.payments,d.totalAmount):""}
  `);
}

function detailSupplier(id){
  const s=S.suppliers.find(x=>x._id===id); if(!s)return "";
  const tc=num(s.totalAmount), pd=sumP(s.payments), rm=Math.max(0,tc-pd);
  const pct=tc>0?Math.min(100,Math.round(pd/tc*100)):100;
  return mWrap("🏪 Supplier Faahfaahin",`
    <div class="det-grid">
      ${dr("Shirkadda",s.companyName)}
      ${s.contactName?dr("Xiriiriyaha",s.contactName):""}${s.phone?dr("Telefoon",s.phone):""}
      ${dr("Alaabta",s.itemDesc)}${dr("Tirada",`${s.qty} qaybood`)}
      ${dr("Cost/Qaybood",fmt(s.unitCost),"#94a3b8")}
      ${dr("Wadarta",fmt(tc),"#fbbf24")}
      ${dr("Nooca Bixin",s.buyType==="kaash"?"💵 Kaash Buuxa":s.buyType==="qayb"?"💳 Qayb+Deyn":"📋 Deyn Buuxa",s.buyType==="kaash"?"#10b981":"#fb923c")}
      ${dr("La Bixiyay",fmt(pd),"#4ade80")}
      ${dr("Dhiman",fmt(rm),rm>0?"#fb923c":"#4ade80")}
      ${dr("Taariikhda",s.date)}
    </div>
    ${s.buyType!=="kaash"&&rm>0?`
    <div style="margin:10px 0">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:4px"><span>La bixiyay</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`:""}
    ${s.buyType!=="kaash"&&rm>0?`
    <div class="pay-box" style="margin-top:10px">
      <div class="lbl">💳 Ku Dar Lacag Bixin (Hadba Meesha Aad Joogto)</div>
      <div class="g2">${fld("Qadarka ($)","sp-p-amt","Hadba waad geli kartaa","number")}${fld("Taariikhda","sp-p-date",td(),"text",td())}</div>
      ${fld("Faallo (ikhtiyaari)","sp-p-note","Tusaale: maalin dambe bixiyay...")}
      <button class="full-btn" style="background:#0e7490;color:#fff;margin-top:4px" onclick="addSPay('${s._id}')">➕ Ku Dar Lacagta</button>
    </div>`:""}
    ${rm<=0&&s.buyType!=="kaash"?`<div class="hint" style="margin-top:10px;text-align:center">✅ Wadarta lacagta waa la bixiyay!</div>`:""}
    ${pd>0?payHistory(s.payments,tc):""}
  `);
}

function dr(l,v,c=""){return`<div class="dr-row"><span class="dr-l">${l}</span><span class="dr-v" style="color:${c||"#f1f5f9"}">${v||"—"}</span></div>`;}
function payHistory(payments,total){
  const paid=sumP(payments);
  return`<div class="pay-hist" style="margin-top:10px">
    <div class="lbl">Taariikhda Lacag Bixinta</div>
    ${payments.map((p,i)=>`<div class="pay-hist-row"><span style="color:#64748b">📅 ${p.date||td()} 👤 ${p.by||"?"}</span><span style="color:#4ade80;font-weight:700">${fmt(p.amount)}</span>${p.note?`<span style="color:#475569;font-size:10px;width:100%">(${p.note})</span>`:""}</div>`).join("")}
    <div style="display:flex;justify-content:space-between;padding:6px 0;font-weight:700;font-size:13px"><span style="color:#94a3b8">Wadarta La Bixiyay:</span><span style="color:#22d3ee">${fmt(paid)}</span></div>
    <div style="display:flex;justify-content:space-between;font-weight:700;font-size:13px"><span style="color:#94a3b8">Dhiman:</span><span style="color:${paid>=num(total)?"#4ade80":"#f472b6"}">${fmt(Math.max(0,num(total)-paid))}</span></div>
  </div>`;
}

// Action handlers
window.updRS=async(id,status)=>{await uDoc("repairs",id,{status,doneDate:status==="Dhammaatay"?td():""});toast("✅ Xaaladda la cusboonaysiiyey");};
window.setGiver=async id=>{const v=$("giv-sel")?.value;if(!v)return;await uDoc("repairs",id,{givenBy:v,givenDate:td()});toast("✅ La xaqiijiyey");};
window.markPaid=async id=>{await uDoc("repairs",id,{payStatus:"Suubiyay"});toast("✅ Lacagta la suubiyay");};
window.addRPay=async id=>{
  const amt=num($("rp-amt")?.value), note=$("rp-note")?.value||"";
  if(!amt)return toast("❗ Geli qadarka",true);
  const r=S.repairs.find(x=>x._id===id);
  await uDoc("repairs",id,{payments:[...(r?.payments||[]),{amount:amt,note,date:td(),by:S.user.name}]});
  toast("✅ Dejin la diiwaan geliyey");
};
window.addDPay=async id=>{
  const amt=num($("dp-amt")?.value), note=$("dp-note")?.value||"";
  if(!amt)return toast("❗ Geli qadarka",true);
  const d=S.debts.find(x=>x._id===id);
  await uDoc("debts",id,{paidAmount:num(d.paidAmount)+amt,payments:[...(d?.payments||[]),{amount:amt,note,date:td(),by:S.user.name}]});
  toast("✅ Lacag bixin la diiwaan geliyey");
};
window.addSPay=async id=>{
  const amt=num($("sp-p-amt")?.value), note=$("sp-p-note")?.value||"", date=$("sp-p-date")?.value||td();
  if(!amt)return toast("❗ Geli qadarka",true);
  const s=S.suppliers.find(x=>x._id===id);
  const payments=[...(s?.payments||[]),{amount:amt,note,date,by:S.user.name}];
  await uDoc("suppliers",id,{payments});
  toast("✅ Lacag bixin la diiwaan geliyey!");
};

function empty(msg){return`<div class="empty"><span style="font-size:28px">📂</span>${msg}</div>`;}
</script>
